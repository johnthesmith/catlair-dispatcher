# Конфигурационный файл
app:
  log:
    enabled: true
    trap: false

# Engine settings
engine:
  # Projects pathes for components searchig like files, payloads etc
  projects:
  - ./
  - ../default
  # default arguments
  default:
    # For undefined route will be use followng route
    route-name: make

# Web settings 
web:
  # Механизм вызова удаленных полезных нагрузок
  summon:
    # Возможность локального вызова если полезная нагрузка доступна 
    prefer-local: false
    # Количество попыток вызова пэйлоада при отказе
    try: 4
    # Хосты по которым потенциально будут осуществляеться вызовы
    # protocol://[user[:password]@]host[:port]
    hosts:
    - http://localhost:42001
    # Предельное время исполнения запроса
    # payload[/method]|*
    request-timeout-mls:
      "*": 1000
    # Предельное время подклюения к хосту
    # payload[/method]|*
    connect-timeout-mls:
      "*": 1000

  default:
    # default context
    context: [ default ]

  # Session settings
  session:
    # Disable or enable session 
    enabled: false
    # Time to live for session cookie
    ttl-sec: 86400
    # This is default secure key
    ssl-key: MySecureKey

  # Маршрутизация запросов по REMOTE_ADDR
  # Обработка:
  #   IP-источник вызова
  #   0.0.0.0/0,... по порядку до первого совпадения
  #     port на который пришло обращение
  #     *|n1,n2,... по порядку до совпадения
  #       host к которому идет обращение
  #       Выбор секци по полному совпадению заголовка Host
  #       *|name1,name2,...
  #         path - перебор path из uri по порядку до совпадения
  #         * - all
  # Если значение ~ или не наден - выполнить payload из URL
  rules:
    # из локальной подсети
    127.0.0.0/8:
      # порт ui
      42010:
        # для localhost
        "127.0.0.1,localhost":
          # при пустом uri
          "/":
            # используем умолчальные uri и context
            uri: /content/page/main.html
            # используем умолчальный контекст
            context: [ default ]
            # трассировка по заоловкам включена
            trace: true
          # любая иная ссылка как есть
          "*":
            trace: true
      # порт диспетчеризации
      42011:
        # любой хост входящий
        "*":
          # любая ссылка уходит
          "*":
            # на диспетчер
            action: dispatcher/dispatch
            trace: true
    # все иные хосты
    "*":
      # для любых портов
      "*":
        #для любого адреса
        "*":
          # уходят в ошибку
          action: error/error404
          trace: true

  # options for cli starting with `php index.php`
  cli:
    # url for cli mode
    url: http://localhost
